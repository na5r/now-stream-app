<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #efa11b; --bg: #111317; --card: #1c1f26; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; transition: 0.8s; }
        #logo { font-family: 'Luckiest Guy', cursive; position: absolute; top: 20px; left: 20px; font-size: 2.5rem; color: var(--accent); }
        .master-btn { position: absolute; top: 20px; right: 20px; color: #333; cursor: pointer; }
        
        /* UNIFIED MODAL STYLING */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #333; transform: scale(0.9); transition: 0.3s; }
        .modal.show .modal-content { transform: scale(1); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .action-btn { background: #2a303c; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .action-btn:hover { background: #3d4659; }
        .back-btn { background: #444; margin-top: 15px; width: 100%; padding: 12px; border-radius: 10px; border: none; color: white; cursor: pointer; }
        .input-field { width: 100%; padding: 15px; margin: 10px 0; background: #0f1217; border: 1px solid #444; color: white; text-align: center; font-size: 1.5rem; border-radius: 10px; }
        h3 { margin-top: 0; font-size: 1.5rem; color: var(--accent); }
    </style>
</head>
<body>

    <div id="logo">KaiStreams</div>
    <div class="master-btn" onclick="document.getElementById('masterModal').classList.add('show')">●</div>
    
    <div id="mainContent" style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh;">
        <div id="profileGrid" style="display:flex; gap:40px;"></div>
        <button class="back-btn" style="width:200px; margin-top:50px;" onclick="document.getElementById('addModal').classList.add('show')">+ Add Profile</button>
    </div>

    <div class="modal" id="pinModal"><div class="modal-content"><h3>Enter PIN</h3><input type="password" id="pinDisplay" readonly class="input-field"><div id="keypad" class="keypad"></div><button class="back-btn" onclick="closeModal('pinModal')">Back</button></div></div>
    <div class="modal" id="masterModal"><div class="modal-content"><h3>Admin Code</h3><input type="password" id="adminDisplay" readonly class="input-field"><div id="adminKeypad" class="keypad"></div><button class="back-btn" onclick="closeModal('masterModal')">Back</button></div></div>
    <div class="modal" id="addModal"><div class="modal-content"><h3>Add Profile</h3><input type="text" id="newName" class="input-field" placeholder="Name"><input type="password" id="newPin" class="input-field" placeholder="4-Digit PIN"><button class="action-btn" style="width:100%; background:var(--accent);" onclick="saveProfile()">Save Profile</button><button class="back-btn" onclick="closeModal('addModal')">Cancel</button></div></div>

    <script>
        const clickSfx = new Audio('click.mp3'); const successSfx = new Audio('success.mp3');
        let profiles = JSON.parse(localStorage.getItem('stream_profiles')) || [{name:"User", pin:"0605", avatar:"https://api.dicebear.com/7.x/bottts/svg?seed=User"}];
        let activeIdx = 0;

        function playClick() { clickSfx.currentTime = 0; clickSfx.play().catch(()=>{}); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function saveProfile() {
            let n = document.getElementById('newName').value; let p = document.getElementById('newPin').value;
            if(!n || !p) return alert("Fill all fields");
            profiles.push({name: n, pin: p, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed="+n});
            localStorage.setItem('stream_profiles', JSON.stringify(profiles));
            location.reload();
        }

        function buildKeypad(containerId, inputId, callback) {
            const container = document.getElementById(containerId);
            [1,2,3,4,5,6,7,8,9,0].forEach(n => container.innerHTML += `<button class="action-btn" onclick="playClick(); document.getElementById('${inputId}').value+='${n}'">${n}</button>`);
            container.innerHTML += `<button class="action-btn" style="background:#cc3333;" onclick="document.getElementById('${inputId}').value=''">C</button>`;
            container.innerHTML += `<button class="action-btn" style="background:#00a896;" onclick="${callback}">OK</button>`;
        }
        buildKeypad('keypad', 'pinDisplay', 'verifyPin()');
        buildKeypad('adminKeypad', 'adminDisplay', 'verifyAdmin()');

        function verifyPin() {
            if(document.getElementById('pinDisplay').value === profiles[activeIdx].pin) {
                successSfx.play(); document.body.style.opacity = "0";
                setTimeout(() => { document.body.innerHTML = "<h1 style='text-align:center; margin-top:200px;'>Home Screen</h1>"; document.body.style.opacity = "1"; }, 800);
            } else { alert("Wrong PIN"); document.getElementById('pinDisplay').value = ""; }
        }

        document.getElementById('profileGrid').innerHTML = profiles.map((p, i) => `
            <div style="text-align:center; cursor:pointer;" onclick="activeIdx=${i}; document.getElementById('pinModal').classList.add('show')">
                <img src="${p.avatar}" style="width:140px; border-radius:50%; border: 4px solid #333;">
                <p style="font-size:1.5rem; margin-top:15px;">${p.name}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
