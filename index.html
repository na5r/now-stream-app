<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <style>
        :root { --accent: #efa11b; --bg: #0f1014; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .box { background: #1c1f26; padding: 40px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 25px; color: var(--accent); }
        .input-field { width: 100%; height: 45px; margin-bottom: 15px; background: #0f1217; border: 1px solid #333; color: white; border-radius: 6px; padding: 0 15px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 6px; cursor: pointer; color: #000; font-weight: bold; font-size: 1rem; }
        .profile-btn { padding: 20px 40px; margin: 10px; background: #2c313c; border: 1px solid #444; color: white; cursor: pointer; border-radius: 8px; font-size: 1.1rem; transition: 0.3s; }
        .profile-btn:hover { border-color: var(--accent); }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginScreen" class="box">
        <h1>KaiStreams</h1>
        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <button class="main-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="profileScreen" class="box hidden" style="width: auto;">
        <h1>Who is watching?</h1>
        <div id="profileGrid"></div>
    </div>

    <div id="dashboard" class="hidden" style="text-align: center;">
        <h1>Dashboard</h1>
        <button class="logout-btn" onclick="auth.signOut(); location.reload();">Log Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdSeTJht66G67mMQq5oRyW0YVVffoQKWM",
            authDomain: "kaistreams.firebaseapp.com",
            projectId: "kaistreams",
            storageBucket: "kaistreams.firebasestorage.app",
            messagingSenderId: "232696634492",
            appId: "1:232696634492:web:de0122ecc33ebe71237df9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
            } catch (e) { alert("Login Error"); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const profiles = userDoc.data().profiles;
                    const grid = document.getElementById('profileGrid');
                    grid.innerHTML = '';
                    profiles.forEach(p => {
                        grid.innerHTML += `<button class="profile-btn" onclick="selectProfile()">${p.name}</button>`;
                    });
                    document.getElementById('profileScreen').classList.remove('hidden');
                }
            }
        });

        window.selectProfile = () => {
            document.getElementById('profileScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        };
    </script>
</body>
</html>
