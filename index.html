<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOW Stream Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --accent: #efa11b; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: #111317; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        
        /* Focus styles for TV remote navigation */
        button:focus, .profile-card:focus { border: 3px solid white !important; transform: scale(1.1); }

        .profile-card { text-align: center; cursor: pointer; width: 140px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid transparent; }
        .profile-card:hover .profile-avatar { border-color: var(--accent); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: #1c1f26; padding: 30px; border-radius: 12px; width: 400px; text-align: center; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .action-btn { background: #222731; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="profileOverlay" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div id="profileGrid" style="display:flex; gap:30px;"></div>
    </div>

    <div class="modal" id="resetKeypadModal">
        <div class="modal-content">
            <h3>Enter Reset Code</h3>
            <input type="text" id="resetCodeDisplay" readonly style="font-size:2rem; width:100%; text-align:center; background:none; border:none; color:white; margin:10px 0;">
            <div class="keypad" id="keypad"></div>
        </div>
    </div>

    <script>
        emailjs.init("A85O4ZgyTDQu8v1dz");
        
        // PFP Gallery
        const pfpGallery = [
            "https://api.dicebear.com/7.x/bottts/svg?seed=1",
            "https://api.dicebear.com/7.x/bottts/svg?seed=2",
            "https://api.dicebear.com/7.x/bottts/svg?seed=3"
        ];

        // Build Keypad
        const keypad = document.getElementById('keypad');
        for(let i=1; i<=9; i++) keypad.innerHTML += `<button class="action-btn" onclick="addKey('${i}')">${i}</button>`;
        keypad.innerHTML += `<button class="action-btn" onclick="addKey('0')">0</button>`;
        keypad.innerHTML += `<button class="action-btn" style="background:#ff4a4a;" onclick="resetKey()">C</button>`;
        keypad.innerHTML += `<button class="action-btn" style="background:#00b2bd;" onclick="submitCode()">OK</button>`;

        let code = "";
        function addKey(n) { if(code.length < 4) code += n; document.getElementById('resetCodeDisplay').value = code; }
        function resetKey() { code = ""; document.getElementById('resetCodeDisplay').value = ""; }
        
        function submitCode() {
            // Check against your global curToken variable
            if(code == curToken) {
                profiles[curIdx].pin = null;
                localStorage.setItem('stream_profiles', JSON.stringify(profiles));
                alert("Unlocked!"); location.reload();
            } else { alert("Wrong Code"); resetKey(); }
        }
    </script>
</body>
</html>
