<style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; }
    .hidden { display: none !important; }
    .box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

    /* Profile Gradient Effect */
    .profile-card { 
        width: 150px; cursor: pointer; transition: transform 0.3s;
        text-align: center; padding: 10px; border-radius: 10px;
    }
    .profile-card:hover { transform: scale(1.1); background: linear-gradient(180deg, #333 0%, #000 100%); }
    .avatar { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 3px solid transparent; }
    .profile-card:hover .avatar { border-color: #fff; }

    /* Home Screen */
    .rail { display: flex; gap: 20px; overflow-x: auto; padding: 20px; }
    .movie-tile { width: 200px; height: 300px; border-radius: 8px; flex-shrink: 0; border: 3px solid transparent; transition: transform 0.2s; }
    .movie-tile:focus { transform: scale(1.1); border-color: white; outline: none; }
</style>
