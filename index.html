<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at 50% 30%, #3d2d0b 0%, #000000 70%); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .hidden { display: none !important; }
        .box { text-align: center; }
        #profileGrid { display: flex; gap: 40px; margin-top: 50px; }
        .profile-container { transition: transform 0.2s; cursor: pointer; }
        .profile-circle { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 3px solid transparent; }
        .profile-container:hover { transform: scale(1.1); }
        .profile-container:hover .profile-circle { border-color: white; }
    </style>
</head>
<body>
    <div id="loginScreen" class="box">
        <h1>KaiStreams</h1>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Password"><br>
        <button id="loginBtn">Sign In</button>
    </div>
    <div id="profileScreen" class="hidden box">
        <h1>Who is watching?</h1>
        <div id="profileGrid"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
