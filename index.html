<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOW Stream Premium</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22NOWStream%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22%23efa11b%22}">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #111317; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; padding-bottom: 80px; }
        #profileOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #111317; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: flex; flex-wrap: wrap; gap: 35px; justify-content: center; }
        .profile-card { text-align: center; cursor: pointer; width: 140px; transition: transform 0.3s; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid rgba(255, 255, 255, 0.08); object-fit: cover; }
        .profile-card:hover { transform: scale(1.1); }
        .profile-card:hover .profile-avatar { border-color: #efa11b; }
        .modal-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1f26; padding: 30px; border-radius: 12px; z-index: 600; width: 90%; max-width: 400px; border: 1px solid #2d3340; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #2a303d; border: 1px solid #3d4659; border-radius: 6px; color: white; }
        .action-btn { background-color: #efa11b; color: #000; border: none; padding: 10px 22px; border-radius: 20px; cursor: pointer; font-weight: 600; width: 100%; }
        #mainApp { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 4%; background: #1c1f26; position: sticky; top: 0; z-index: 10; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-wrapper input { width: 250px; margin-bottom: 0; border-radius: 20px; }
        .voice-mic-btn { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #a9afba; }
        .voice-mic-btn.listening { color: #ff4a4a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } }
        .row { margin: 30px 0 0 4%; }
        .row-posters { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; }
        .continue-card { width: 220px; flex-shrink: 0; cursor: pointer; }
        .continue-img { width: 100%; height: 125px; object-fit: cover; background: #222731; border-radius: 6px; }
        .progress-track { height: 4px; background: #3d4659; width: 100%; margin-top: 8px; border-radius: 2px; }
        .progress-fill { height: 100%; background: #efa11b; width: 0%; border-radius: 2px; }
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 700; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="profileOverlay">
        <div class="profile-grid" id="profileGrid"></div>
        <button class="action-btn" style="width: auto; margin-top: 40px;" onclick="document.getElementById('creatorModal').style.display='block'">+ Add Profile</button>
    </div>

    <div class="modal-popup" id="creatorModal">
        <h3>Create Profile</h3>
        <input type="text" id="newProfileName" placeholder="Name">
        <input type="password" id="newProfilePin" placeholder="PIN (Optional)">
        <button class="action-btn" onclick="saveNewProfile()">Save Profile</button>
    </div>

    <div class="modal-popup" id="pinGateModal">
        <h3>Security Lock</h3>
        <input type="password" id="verifyPinInput" placeholder="Enter PIN">
        <button class="action-btn" onclick="verifyProfilePin()">Unlock</button>
        <p style="text-align: center; margin-top:10px;"><a href="#" id="forgotPinLink" onclick="sendRandomisedResetEmail()" style="color:#efa11b;">Forgot PIN?</a></p>
    </div>

    <div id="mainApp">
        <header>
            <div style="font-weight:800; color:#efa11b; font-size:24px;">NOW</div>
            <div class="search-wrapper">
                <input type="text" id="torrentioUrl" placeholder="Search...">
                <button class="voice-mic-btn" id="voiceBtn" onclick="runVoiceRecognition()">🎙️</button>
            </div>
        </header>

        <div class="row" id="continueRow" style="display:none;">
            <div style="margin-bottom:10px;">Continue Watching</div>
            <div class="row-posters" id="continuePostersContainer"></div>
        </div>

        <div class="row">
            <div>Trending</div>
            <div class="row-posters">
                <img class="continue-img" style="width:200px;" src="https://image.tmdb.org/t/p/w500/uVEFQvFMMsg4e6yb03xOfVsDz4o.jpg" onclick="openPlayer('tt1254207', 'Big Buck Bunny', 'https://image.tmdb.org/t/p/w500/uVEFQvFMMsg4e6yb03xOfVsDz4o.jpg')">
            </div>
        </div>
    </div>

    <div class="player-modal" id="playerModal">
        <span onclick="closePlayer()" style="position:absolute; top:20px; right:20px; cursor:pointer; font-size:30px;">&times;</span>
        <video id="videoPlayer" controls style="width:90%; max-width:900px;"></video>
    </div>

    <script>
        emailjs.init("A85O4ZgyTDQu8v1dz");
        let profiles = JSON.parse(localStorage.getItem('stream_profiles')) || [];
        let curIdx = null; let curToken = null;
        let pTracker = null;

        window.onload = renderProfiles;

        function renderProfiles() {
            const grid = document.getElementById('profileGrid'); grid.innerHTML = "";
            profiles.forEach((p, i) => {
                grid.innerHTML += `<div class="profile-card" onclick="selectProfile(${i})"><img class="profile-avatar" src="${p.avatar}"><p>${p.name}</p></div>`;
            });
        }

        function saveNewProfile() {
            const n = document.getElementById('newProfileName').value;
            const p = document.getElementById('newProfilePin').value;
            profiles.push({ name: n, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed="+n, pin: p, continueWatching: [] });
            localStorage.setItem('stream_profiles', JSON.stringify(profiles));
            location.reload();
        }

        function selectProfile(i) {
            curIdx = i;
            if(profiles[i].pin) document.getElementById('pinGateModal').style.display = 'block';
            else launch(i);
        }

        function verifyProfilePin() {
            if(document.getElementById('verifyPinInput').value === profiles[curIdx].pin) launch(curIdx);
            else alert("Wrong PIN");
        }

        function launch(i) {
            document.getElementById('profileOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            renderContinue();
        }

        function renderContinue() {
            const container = document.getElementById('continuePostersContainer');
            const data = profiles[curIdx].continueWatching;
            if(data.length > 0) {
                document.getElementById('continueRow').style.display = 'block';
                container.innerHTML = data.map(item => `
                    <div class="continue-card" onclick="openPlayer('${item.id}', '${item.title}', '${item.poster}', ${item.savedTime})">
                        <img class="continue-img" src="${item.poster}">
                        <div class="progress-track"><div class="progress-fill" style="width:${(item.savedTime/item.totalDuration)*100}%"></div></div>
                    </div>
                `).join('');
            }
        }

        function runVoiceRecognition() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const btn = document.getElementById('voiceBtn');
            rec.onstart = () => btn.classList.add('listening');
            rec.onend = () => btn.classList.remove('listening');
            rec.onresult = (e) => {
                const txt = e.results[0][0].transcript.toLowerCase();
                if(txt.includes("bunny")) openPlayer('tt1254207', 'Big Buck Bunny', 'https://image.tmdb.org/t/p/w500/uVEFQvFMMsg4e6yb03xOfVsDz4o.jpg');
            };
            rec.start();
        }

        function openPlayer(id, title, poster, start = 0) {
            const v = document.getElementById('videoPlayer');
            document.getElementById('playerModal').style.display = 'flex';
            v.src = "https://www.w3schools.com/html/mov_bbb.mp4";
            v.currentTime = start;
            v.play();
            pTracker = setInterval(() => {
                let list = profiles[curIdx].continueWatching.filter(x => x.id !== id);
                list.unshift({ id, title, poster, savedTime: v.currentTime, totalDuration: v.duration });
                profiles[curIdx].continueWatching = list.slice(0,5);
                localStorage.setItem('stream_profiles', JSON.stringify(profiles));
            }, 5000);
        }

        function closePlayer() {
            clearInterval(pTracker);
            document.getElementById('playerModal').style.display = 'none';
            renderContinue();
        }

        function sendRandomisedResetEmail() {
            curToken = Math.floor(1000 + Math.random() * 9000);
            emailjs.send("service_054btpr", "template_xanp45j", { profile_name: profiles[curIdx].name, random_pin: curToken });
            const input = prompt("Enter the 4-digit code sent to your email:");
            if(input == curToken) { profiles[curIdx].pin = null; localStorage.setItem('stream_profiles', JSON.stringify(profiles)); alert("PIN cleared!"); location.reload(); }
        }
    </script>
</body>
</html>
