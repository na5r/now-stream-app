<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams Login</title>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1c1f26; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .input-field { width: 100%; height: 50px; margin-bottom: 15px; background: #0f1217; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: #efa11b; border: none; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="clickSfx" src="click.mp3"></audio>
    <audio id="typeSfx" src="type.mp3"></audio>
    <audio id="successSfx" src="success.mp3"></audio>

    <div id="loginContainer" class="box">
        <h1>KaiStreams</h1>
        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <button class="main-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdSeTJht66G67mMQq5oRyW0YVVffoQKWM",
  authDomain: "kaistreams.firebaseapp.com",
  databaseURL: "https://kaistreams-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kaistreams",
  storageBucket: "kaistreams.firebasestorage.app",
  messagingSenderId: "232696634492",
  appId: "1:232696634492:web:de0122ecc33ebe71237df9",
  measurementId: "G-FXLJM4LCXC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sound Logic
        const playSfx = (id) => {
            const sfx = document.getElementById(id);
            sfx.currentTime = 0;
            sfx.play().catch(e => console.log("Audio blocked until interaction"));
        };

        // Add typing sound
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => playSfx('typeSfx'));
        });

        window.handleLogin = async () => {
            playSfx('clickSfx');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                playSfx('successSfx');
                alert("Login Successful!");
            } catch (e) {
                alert("Invalid Credentials");
            }
        };
    </script>
</body>
</html>
