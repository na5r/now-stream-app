<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #efa11b; --bg: #111317; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; transition: 0.8s; overflow: hidden; }
        #logo { font-family: 'Luckiest Guy', cursive; position: absolute; top: 20px; left: 20px; font-size: 2.5rem; color: var(--accent); }
        .master-corner { position: absolute; top: 20px; right: 20px; color: #333; cursor: pointer; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); opacity:0; transition: 0.3s; justify-content:center; align-items:center; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: #1c1f26; padding: 40px; border-radius: 16px; transform: scale(0.9); transition: 0.3s; width: 320px; text-align: center; border: 1px solid #333; }
        .modal.show .modal-content { transform: scale(1); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .action-btn { background: #2a303c; color: white; border: none; padding: 20px; border-radius: 8px; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .action-btn:hover { background: #3d4659; transform: scale(1.05); }
        .input-field { width: 100%; padding: 15px; margin-bottom: 20px; background: #0f1217; border: 1px solid #444; color: white; text-align: center; font-size: 2rem; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="logo">KaiStreams</div>
    <div class="master-corner" onclick="alert('Admin Only')">●</div>
    <div id="profileGrid" style="display:flex; justify-content:center; align-items:center; height:100vh; gap:40px;"></div>

    <div class="modal" id="pinModal"><div class="modal-content"><h3>Enter PIN</h3><input type="password" id="pinDisplay" readonly class="input-field"><div id="keypad" class="keypad"></div></div></div>

    <script>
        const clickSfx = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-typewriter-soft-click-1125.mp3');
        const successSfx = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3');
        let profiles = JSON.parse(localStorage.getItem('stream_profiles')) || [{name:"User", pin:"0605", avatar:"https://api.dicebear.com/7.x/bottts/svg?seed=User"}];

        // Build Keypad
        const kp = document.getElementById('keypad');
        [1,2,3,4,5,6,7,8,9,0].forEach(n => kp.innerHTML += `<button class="action-btn" onclick="addPin('${n}')">${n}</button>`);
        kp.innerHTML += `<button class="action-btn" style="background:#cc3333;" onclick="document.getElementById('pinDisplay').value=''">C</button>`;
        kp.innerHTML += `<button class="action-btn" style="background:#00a896;" onclick="verify()">OK</button>`;

        function addPin(n) { 
            clickSfx.currentTime = 0; clickSfx.play();
            let d = document.getElementById('pinDisplay'); 
            if(d.value.length < 4) d.value += n; 
        }

        // External Keyboard Support
        document.addEventListener('keydown', (e) => {
            if(e.key >= 0 && e.key <= 9) addPin(e.key);
            if(e.key === "Enter") verify();
            if(e.key === "Backspace") document.getElementById('pinDisplay').value = "";
        });

        function verify() {
            if(document.getElementById('pinDisplay').value === profiles[0].pin) {
                successSfx.play();
                document.body.style.transform = "scale(2)";
                document.body.style.opacity = "0";
                setTimeout(() => location.reload(), 800);
            }
        }
        
        // Render
        document.getElementById('profileGrid').innerHTML = profiles.map((p, i) => `
            <div style="text-align:center; cursor:pointer;" onclick="document.getElementById('pinModal').classList.add('show')">
                <img src="${p.avatar}" style="width:140px; border-radius:50%; border: 4px solid #333;">
                <p style="font-size:1.5rem; margin-top:15px;">${p.name}</p>
            </div>
        `).join('');
    </script>
</body>
</html>
