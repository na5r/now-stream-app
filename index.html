<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <style>
        :root { --accent: #efa11b; --bg: #0f1014; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .profile-grid { display: flex; gap: 20px; }
        .profile-btn { padding: 20px; background: #2c313c; border: none; color: white; cursor: pointer; border-radius: 10px; }
        .delete-btn { font-size: 0.7rem; color: #ff4444; cursor: pointer; background: none; border: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <audio id="clickSfx" src="click.mp3"></audio>
    <audio id="successSfx" src="success.mp3"></audio>

    <div id="loginScreen" class="screen">
        <div class="box">
            <h1>KaiStreams</h1>
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="main-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="profileScreen" class="screen hidden">
        <h1>Who is watching?</h1>
        <div id="profileGrid" class="profile-grid"></div>
    </div>

    <div id="dashboard" class="hidden">
        <h1>Dashboard</h1>
        <button onclick="auth.signOut(); location.reload();">Log Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const app = initializeApp({ /* YOUR CONFIG HERE */ });
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Fetch and display profiles
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const profiles = userDoc.data().profiles;
                const grid = document.getElementById('profileGrid');
                grid.innerHTML = '';
                profiles.forEach(p => {
                    grid.innerHTML += `
                        <div style="text-align:center">
                            <button class="profile-btn" onclick="selectProfile('${p.name}')">${p.name}</button>
                            <button class="delete-btn" onclick="attemptDelete('${p.name}', '${p.pin}')">Delete</button>
                        </div>`;
                });
                document.getElementById('profileScreen').classList.remove('hidden');
            }
        });

        window.attemptDelete = (name, pin) => {
            const inputPin = prompt("Enter Admin Code to delete " + name + ":");
            if (inputPin === pin) {
                alert("Logic to delete " + name + " goes here!"); 
                // We will implement the actual Firebase 'arrayRemove' next
            } else {
                alert("Incorrect PIN!");
            }
        };

        window.selectProfile = (name) => {
            document.getElementById('profileScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        };
    </script>
</body>
</html>
