<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #1a1a1a; transition: 0.3s; padding-top: 50px; z-index: 1000; }
        #sidebar.open { left: 0; }
        .menu-item { padding: 20px; cursor: pointer; transition: 0.2s; font-size: 20px; }
        .menu-item:focus { background: #e50914; outline: none; }
        #app { padding: 20px; transition: 0.3s; }
        .rail { display: flex; gap: 20px; padding: 20px 0; overflow-x: auto; }
        .rail::-webkit-scrollbar { display: none; }
        .movie-tile { width: 200px; height: 300px; background: #333; border: 4px solid transparent; transition: 0.2s; flex-shrink: 0; cursor: pointer; }
        .movie-tile:focus { transform: scale(1.1); border-color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="menu-item" tabindex="0" onclick="window.location.reload()">Home</div>
        <div class="menu-item" tabindex="0" id="filterMovies">Movies</div>
        <div class="menu-item" tabindex="0" id="filterSeries">Series</div>
    </div>
    <div id="app">
        <header><h1>KaiStreams</h1></header>
        <div id="container"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
