<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #efa11b; --bg: #0f1014; --sidebar: #15171c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        #loginContainer { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: #1c1f26; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .input-field { width: 100%; height: 50px; margin-bottom: 15px; background: #0f1217; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar); padding: 40px; }
        .main-view { flex: 1; padding: 40px; overflow-y: auto; }
        .nav-btn { display: block; background: none; border: none; color: white; margin-bottom: 20px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <audio id="clickSfx" src="click.mp3"></audio>
    <audio id="successSfx" src="success.mp3"></audio>

    <div id="loginContainer">
        <div class="box">
            <h1>KaiStreams</h1>
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="main-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="dashboard" class="hidden app-container">
        <div class="sidebar">
            <h1 style="color:var(--accent); font-family:'Luckiest Guy'">KaiStreams</h1>
            <button class="nav-btn" onclick="renderView('dashboard')">Browse</button>
            <button class="nav-btn" onclick="renderView('comingSoon')">Coming Soon</button>
        </div>
        <div id="mainView" class="main-view"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdSeTJht66G67mMQq5oRyW0YVVffoQKWM",
            authDomain: "kaistreams.firebaseapp.com",
            databaseURL: "https://kaistreams-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kaistreams",
            storageBucket: "kaistreams.firebasestorage.app",
            messagingSenderId: "232696634492",
            appId: "1:232696634492:web:de0122ecc33ebe71237df9",
            measurementId: "G-FXLJM4LCXC"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const playSfx = (id) => {
            const sfx = document.getElementById(id);
            sfx.currentTime = 0;
            sfx.play().catch(() => {});
        };

        // Use click sound for typing
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => playSfx('clickSfx'));
        });

        window.handleLogin = async () => {
            playSfx('clickSfx');
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                playSfx('successSfx');
                showDashboard();
            } catch (e) { alert("Invalid Credentials"); }
        };

        function showDashboard() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            renderView('dashboard');
        }

        window.renderView = async (view) => {
            const mv = document.getElementById('mainView');
            if (view === 'dashboard') {
                mv.innerHTML = '<h1>Recommended</h1><p>Loading...</p>';
                try {
                    const res = await fetch('/api/get-movies');
                    const data = await res.json();
                    mv.innerHTML = '<h1>Recommended</h1><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } catch (e) { mv.innerHTML = '<h1>Recommended</h1><p>Error loading.</p>'; }
            } else { mv.innerHTML = '<h1>Coming Soon</h1>'; }
        }

        onAuthStateChanged(auth, (user) => { if (user) showDashboard(); });
    </script>
</body>
</html>
