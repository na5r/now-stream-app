<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen" class="screen">
        <h1>KaiStreams</h1>
        <input type="email" id="email" placeholder="Email"><input type="password" id="pass" placeholder="Password">
        <button id="loginBtn">Sign In</button>
    </div>
    <div id="profileScreen" class="screen hidden"><h1>Who is watching?</h1><div id="profileGrid"></div></div>
    <div id="homeScreen" class="screen hidden">
        <div id="sidebar" tabindex="0">
            <div class="menu-item" tabindex="0" onclick="location.reload()">Home</div>
            <div class="menu-item" tabindex="0">Movies</div>
            <div class="menu-item" tabindex="0">Series</div>
        </div>
        <header><input type="text" id="searchInput" placeholder="Search..."></header>
        <div id="container"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
