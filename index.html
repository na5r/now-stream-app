<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #efa11b; --bg: #111317; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; transition: 0.8s; }
        #logo { font-family: 'Luckiest Guy', cursive; position: absolute; top: 20px; left: 20px; font-size: 2.5rem; color: var(--accent); }
        .master-btn { position: absolute; top: 20px; right: 20px; color: #333; cursor: pointer; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); opacity:0; transition: 0.3s; justify-content:center; align-items:center; z-index:1000; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: #1c1f26; padding: 30px; border-radius: 16px; transform: scale(0.9); transition: 0.3s; width: 320px; text-align: center; border: 1px solid #333; }
        .modal.show .modal-content { transform: scale(1); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .action-btn { background: #2a303c; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
        .back-btn { background: #444; margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; border: none; color: white; cursor: pointer; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 10px; background: #0f1217; border: 1px solid #444; color: white; text-align: center; font-size: 1.5rem; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="logo">KaiStreams</div>
    <div class="master-btn" onclick="document.getElementById('masterModal').classList.add('show')">●</div>
    <div id="profileGrid" style="display:flex; justify-content:center; align-items:center; height:100vh; gap:40px;"></div>

    <div class="modal" id="pinModal"><div class="modal-content"><h3>Enter PIN</h3><input type="password" id="pinDisplay" readonly class="input-field"><div id="keypad" class="keypad"></div><button class="back-btn" onclick="closeModal('pinModal')">Back</button><button class="back-btn" style="background:#555;" onclick="alert('Contact Admin: Code 0605')">Forgot PIN?</button></div></div>

    <div class="modal" id="masterModal"><div class="modal-content"><h3>Admin (Delete Profiles)</h3><input type="password" id="adminDisplay" readonly class="input-field"><div id="adminKeypad" class="keypad"></div><button class="back-btn" onclick="closeModal('masterModal')">Back</button></div></div>

    <script>
        const clickSfx = new Audio('click.mp3'); const successSfx = new Audio('success.mp3');
        let profiles = JSON.parse(localStorage.getItem('stream_profiles')) || [{name:"User", pin:"0605", avatar:"https://api.dicebear.com/7.x/bottts/svg?seed=User"}];
        
        function playClick() { clickSfx.currentTime = 0; clickSfx.play(); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function buildKeypad(containerId, inputId, callback) {
            const container = document.getElementById(containerId);
            [1,2,3,4,5,6,7,8,9,0].forEach(n => container.innerHTML += `<button class="action-btn" onclick="playClick(); document.getElementById('${inputId}').value+='${n}'">${n}</button>`);
            container.innerHTML += `<button class="action-btn" style="background:#cc3333;" onclick="document.getElementById('${inputId}').value=''">C</button>`;
            container.innerHTML += `<button class="action-btn" style="background:#00a896;" onclick="${callback}">OK</button>`;
        }
        buildKeypad('keypad', 'pinDisplay', 'verifyPin()');
        buildKeypad('adminKeypad', 'adminDisplay', 'verifyAdmin()');

        function verifyPin() {
            if(document.getElementById('pinDisplay').value === profiles[0].pin) {
                successSfx.play(); document.body.style.opacity = "0";
                setTimeout(() => document.body.innerHTML = "<h1 style='text-align:center; margin-top:200px;'>Home Screen</h1>", 800);
            }
        }

        function verifyAdmin() {
            if(document.getElementById('adminDisplay').value === "0605") {
                alert("Admin Mode: Click a profile to Delete it");
                document.getElementById('masterModal').classList.remove('show');
                render(true);
            }
        }

        function render(adminMode) {
            document.getElementById('profileGrid').innerHTML = profiles.map((p, i) => `
                <div style="text-align:center; cursor:pointer;" onclick="${adminMode ? `if(confirm('Delete ${p.name}?')) { profiles.splice(${i},1); localStorage.setItem('stream_profiles', JSON.stringify(profiles)); location.reload(); }` : `document.getElementById('pinModal').classList.add('show')`}">
                    <img src="${p.avatar}" style="width:140px; border-radius:50%; border: 4px solid #333;">
                    <p style="font-size:1.5rem; margin-top:15px;">${p.name}</p>
                </div>
            `).join('');
        }
        render(false);
    </script>
</body>
</html>
