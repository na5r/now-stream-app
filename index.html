<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams Login</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // PASTE YOUR CONFIG FROM FIREBASE SETTINGS HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("Login Successful! Loading Dashboard...");
                // Here you would trigger the function that shows your dashboard
            } catch (error) {
                alert("Access Denied: " + error.message);
            }
        };
    </script>
</head>
<body style="background:#0f1014; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div id="loginBox" style="background:#1c1f26; padding:40px; border-radius:20px; text-align:center;">
        <h1>KaiStreams Login</h1>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:15px; margin:10px 0; background:#0f1217; border:none; color:white; border-radius:8px;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; padding:15px; margin:10px 0; background:#0f1217; border:none; color:white; border-radius:8px;">
        <button onclick="handleLogin()" style="width:100%; padding:15px; background:#efa11b; border:none; border-radius:8px; cursor:pointer;">Sign In</button>
    </div>

</body>
</html>
