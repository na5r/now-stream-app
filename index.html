<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaiStreams</title>
    <style>
        :root { --accent: #efa11b; --bg: #0f1014; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        .screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .box { background: #1c1f26; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .input-field { width: 100%; height: 50px; margin-bottom: 15px; background: #0f1217; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; }
        .profile-btn { margin: 10px; padding: 20px; background: #2c313c; border: none; color: white; cursor: pointer; border-radius: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <audio id="clickSfx" src="click.mp3"></audio>
    <audio id="successSfx" src="success.mp3"></audio>

    <div id="loginScreen" class="screen">
        <div class="box">
            <h1>KaiStreams</h1>
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="main-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="profileScreen" class="screen hidden">
        <h1>Who is watching?</h1>
        <div id="profileGrid"></div>
    </div>

    <div id="dashboard" class="hidden">
        <h1>Dashboard</h1>
        <div id="mainView"></div>
        <button onclick="auth.signOut(); location.reload();">Log Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdSeTJht66G67mMQq5oRyW0YVVffoQKWM",
            authDomain: "kaistreams.firebaseapp.com",
            projectId: "kaistreams",
            storageBucket: "kaistreams.firebasestorage.app",
            messagingSenderId: "232696634492",
            appId: "1:232696634492:web:de0122ecc33ebe71237df9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
            } catch (e) { alert("Login Error: " + e.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Logged in with UID:", user.uid); // Check this against Firestore Document ID
                document.getElementById('loginScreen').classList.add('hidden');
                
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const profiles = userDoc.data().profiles;
                        const grid = document.getElementById('profileGrid');
                        grid.innerHTML = '';
                        profiles.forEach(p => {
                            grid.innerHTML += `<button class="profile-btn" onclick="selectProfile('${p.name}')">${p.name}</button>`;
                        });
                        document.getElementById('profileScreen').classList.remove('hidden');
                    } else {
                        alert("No document found in 'users' collection with ID: " + user.uid);
                    }
                } catch (e) { console.error("Database error:", e); }
            }
        });

        window.selectProfile = (name) => {
            document.getElementById('profileScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        };
    </script>
</body>
</html>
